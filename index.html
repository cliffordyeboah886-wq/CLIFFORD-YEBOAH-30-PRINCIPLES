<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clifford Yeboah | The 30 Principles</title>
    <style>
        /* FONTS */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --primary: #0f172a;
            --accent: #b45309;
            --bg: #f1f5f9;
            --card-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--primary);
        }

        /* THE CARD */
        .card {
            background: var(--card-white);
            width: 100%;
            max-width: 420px;
            min-height: 520px;
            border-radius: 32px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* GHANA FLAG STRIPE */
        .stripe {
            height: 8px;
            display: flex;
            width: 100%;
        }
        .s-red { background: #ce1126; flex: 1; }
        .s-yellow { background: #fcd116; flex: 1; }
        .s-green { background: #006b3f; flex: 1; }

        .card-content {
            padding: 45px 35px;
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* THE PHOTO */
        .profile-photo {
            position: absolute;
            top: 35px;
            right: 35px;
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 3px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: #cbd5e1;
            overflow: hidden;
            z-index: 10;
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .tag-container {
            margin-bottom: 30px;
        }

        .tag {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: #fef3c7;
            color: #92400e;
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid #fde68a;
        }

        .quote-area {
            flex: 1;
            display: flex;
            align-items: center;
            padding-top: 20px;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            line-height: 1.45;
            color: #1e293b;
            transition: all 0.5s ease;
            opacity: 1;
            transform: translateX(0);
        }

        /* SLIDE ANIMATION */
        .slide-out {
            opacity: 0;
            transform: translateX(-20px);
        }
        .slide-in {
            opacity: 0;
            transform: translateX(20px);
        }

        .footer {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .signature {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .initials {
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 14px;
        }

        .sig-text h3 {
            font-size: 15px;
            font-weight: 900;
            margin: 0;
        }

        .sig-text p {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-top: 2px;
        }

        .index-num {
            font-size: 28px;
            font-weight: 900;
            font-style: italic;
            color: #e2e8f0;
        }

        /* PROGRESS BAR */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #f1f5f9;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
        }

        /* CONTROLS */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            font-size: 10px;
            text-transform: uppercase;
            transition: all 0.2s;
            color: #64748b;
            min-width: 80px;
        }

        .btn:hover { background: #f8fafc; color: var(--primary); }
        .btn:active { transform: scale(0.95); }
        
        /* Highlight the pause button when active */
        .btn-active {
            background: #fef2f2;
            color: #dc2626;
            border-color: #fecaca;
        }

        @media (max-width: 480px) {
            .card { max-width: 90vw; min-height: 480px; }
            .quote-text { font-size: 1.25rem; }
            .btn { padding: 10px 12px; min-width: 70px; font-size: 9px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="stripe">
            <div class="s-red"></div>
            <div class="s-yellow"></div>
            <div class="s-green"></div>
        </div>

        <div class="card-content">
            <!-- PHOTO: Ensure your file is named profile.jpg -->
            <div class="profile-photo">
                <img src="profile.jpg" alt="Clifford Yeboah" id="profile-img" onerror="this.parentElement.style.background='#cbd5e1'">
            </div>

            <div class="tag-container">
                <span class="tag" id="quote-tag">On Integrity</span>
            </div>

            <div class="quote-area">
                <div class="quote-text" id="quote-text">
                    "Power without integrity is a house built on sand; when the tide of truth rises, it leaves the oppressor with nothing to say."
                </div>
            </div>

            <div class="footer">
                <div class="signature">
                    <div class="initials">CY</div>
                    <div class="sig-text">
                        <h3>Clifford Yeboah</h3>
                        <p>Teacher • Advocate • Leader</p>
                    </div>
                </div>
                <div class="index-num" id="quote-index">01</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="manualPrev()">Previous</button>
        <button class="btn" id="pause-btn" onclick="togglePause()">Pause</button>
        <button class="btn" onclick="manualNext()">Next</button>
    </div>

    <script>
        const quotes = [
            { tag: "On Integrity", text: "Power without integrity is a house built on sand; when the tide of truth rises, it leaves the oppressor with nothing to say." },
            { tag: "On Documentation", text: "Voices can be drowned out and stories can be changed, but the written truth is an anchor that no storm can move." },
            { tag: "On Resilience", text: "They thought they were burying me, but they didn't know I was a seed. The more they piled on the dirt of lies, the stronger my roots of truth grew." },
            { tag: "On Evidence", text: "In a room full of false claims, a single piece of evidence is the only light that matters. Lies have no legs to stand on when the truth is documented." },
            { tag: "On Mentorship", text: "A mentor’s greatest lesson isn't found in a textbook; it is found in showing a student how to stand tall when the world expects them to bow." },
            { tag: "On Perception", text: "I do not need sound to recognise the rhythm of truth. Integrity has its own vibration, and I feel it in my soul." },
            { tag: "On Advocacy", text: "I did not stand up just to save myself; I stood up so the path would be smoother for every student and teacher walking behind me." },
            { tag: "On Identity", text: "My ears may not hear the noise of the world, but my heart hears the call for justice with perfect clarity." },
            { tag: "On Leadership", text: "A true leader does not use their position to silence others, but to ensure that even the quietest voice is given the space to be heard." },
            { tag: "On Courage", text: "The courage of a single heart is louder than the silence of a hundred fears." },
            { tag: "On Liberation", text: "Fear is a heavy chain, but the truth is the key that unlocks it. Once you are free, you can never be enslaved by intimidation again." },
            { tag: "On Equality", text: "Disability is only a limitation in the eyes of those who lack the vision to see our strength." },
            { tag: "On the Power of One", text: "I waited for others to join me in the fight against injustice, only to realise that sometimes, one must be the light so that others may eventually find their way out of the dark." },
            { tag: "On Justice vs. Rank", text: "They saw a 'lowly' man because I am Deaf; I saw a 'weak' system because they lacked integrity. In the court of truth, knowledge of justice is the ultimate equaliser." },
            { tag: "On Authority", text: "Justice does not recognise rank, and truth does not bow to age. Knowledge of what is right is the ultimate equaliser." },
            { tag: "On Advocacy", text: "The 'smoking gun' of evidence is only powerful if you have the courage to pull the trigger of truth." },
            { tag: "On True Disability", text: "True disability is not the loss of hearing; it is the loss of the will to stand up for what is right." },
            { tag: "On Actions", text: "I may be a man of few spoken words, but my actions will always speak volumes for the rights of the vulnerable." },
            { tag: "On Education", text: "A classroom is not just a place for facts; it is a sanctuary where character is forged and the courage to question is born." },
            { tag: "On Silence", text: "There is a profound difference between being silenced and being silent. One is an act of oppression; the other is a choice of strength." },
            { tag: "On Character", text: "The true measure of a man is not found in his titles, but in the echoes of the lives he has uplifted." },
            { tag: "On Truth", text: "Truth is like the sun; you can hide it behind the clouds of bureaucracy for a while, but it will eventually burn through." },
            { tag: "On Purpose", text: "My purpose was never to be famous, but to be faithful—faithful to the truth and to those who have no voice." },
            { tag: "On Legacy", text: "Legacy is not what we leave for people, but what we leave in them." },
            { tag: "On Responsibility", text: "To know the truth and remain silent is to side with the oppressor. Knowledge is not a gift to be kept; it is a tool to be used for justice." },
            { tag: "On Unseen Strength", text: "They assume that because I cannot hear their words, I cannot understand their intentions. But I have learned to read the heart, and the heart never lies." },
            { tag: "On Endurance", text: "The road to justice is long and often lonely, but I would rather walk a thousand miles in the light of truth than take a single step in the shadow of a lie." },
            { tag: "On the Future", text: "We do not build for today; we build for the generations yet unborn, so they may never have to fight the battles we have already won." },
            { tag: "On True Wealth", text: "Wealth is not measured by what you have in your pockets, but by the peace you have in your conscience when you close your eyes at night." },
            { tag: "On the Final Word", text: "At the end of the day, the noise of the world fades away, and only the truth remains standing. I choose to stand with the truth." }
        ];

        let currentIndex = 0;
        let slideInterval;
        let isPaused = false;
        const SLIDE_TIME = 10000; // 10 seconds

        const textEl = document.getElementById('quote-text');
        const tagEl = document.getElementById('quote-tag');
        const indexEl = document.getElementById('quote-index');
        const progressEl = document.getElementById('progress');
        const pauseBtn = document.getElementById('pause-btn');

        function updateDisplay() {
            textEl.classList.add('slide-out');
            
            setTimeout(() => {
                textEl.innerText = `"${quotes[currentIndex].text}"`;
                tagEl.innerText = quotes[currentIndex].tag;
                indexEl.innerText = (currentIndex + 1).toString().padStart(2, '0');
                
                textEl.classList.remove('slide-out');
                textEl.classList.add('slide-in');
                
                setTimeout(() => {
                    textEl.classList.remove('slide-in');
                }, 50);

                if (!isPaused) resetProgressBar();
            }, 400);
        }

        function resetProgressBar() {
            progressEl.style.transition = 'none';
            progressEl.style.width = '0%';
            setTimeout(() => {
                if (!isPaused) {
                    progressEl.style.transition = `width ${SLIDE_TIME}ms linear`;
                    progressEl.style.width = '100%';
                }
            }, 50);
        }

        function startAutoSlide() {
            isPaused = false;
            pauseBtn.innerText = "Pause";
            pauseBtn.classList.remove('btn-active');
            resetProgressBar();
            
            clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                currentIndex = (currentIndex + 1) % quotes.length;
                updateDisplay();
            }, SLIDE_TIME);
        }

        function togglePause() {
            if (!isPaused) {
                // Pause it
                clearInterval(slideInterval);
                isPaused = true;
                pauseBtn.innerText = "Resume";
                pauseBtn.classList.add('btn-active');
                
                // Freeze progress bar where it is
                const computedStyle = window.getComputedStyle(progressEl);
                const width = computedStyle.getPropertyValue('width');
                progressEl.style.transition = 'none';
                progressEl.style.width = width;
            } else {
                // Resume it
                startAutoSlide();
            }
        }

        function manualNext() {
            currentIndex = (currentIndex + 1) % quotes.length;
            updateDisplay();
            startAutoSlide(); // Always resume on manual click
        }

        function manualPrev() {
            currentIndex = (currentIndex - 1 + quotes.length) % quotes.length;
            updateDisplay();
            startAutoSlide(); // Always resume on manual click
        }

        // Initialize
        window.onload = startAutoSlide;
    </script>
</body>
</html>
